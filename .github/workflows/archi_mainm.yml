name: Azure Continuous Delivery

on:
  workflow_dispatch:
    inputs:
      IMAGE_REPOSITORY:
        description: 'Repository of the image (same as declared in App Service creation)'
        required: true
        default: 'api-vise'
      IMAGE_TAG:
        description: 'Tag of the image'
        required: true
        default: 'latest'
      AZURE_WEBAPP_NAME:
        description: 'Nombre del App Service creado en Azure'
        required: true
      PORT:
        description: 'Port of the application'
        required: true
        default: '443'

jobs:
  build-and-push-image:
    name: Build and Push to ACR
    runs-on: ubuntu-latest
    env:
      ACR_HOST: ${{ secrets.ACR_NAME_ARCHI }}.azurecr.io
      IMAGE_FULL: ${{ secrets.ACR_NAME_ARCHI }}.azurecr.io/${{ github.event.inputs.IMAGE_REPOSITORY }}:${{ github.event.inputs.IMAGE_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_NAME_ARCHI }}.azurecr.io
          username: ${{ secrets.ACR_NAME_ARCHI }}
          password: ${{ secrets.ACR_PASSWORD_ARCHI }}

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect Dockerfile and context, then build + push
        run: |
          set -euo pipefail
          echo "🔎 Detecting Dockerfile location..."
          # Lista de candidatos (de más a menos probables)
          CANDIDATES=(
            "./vise-api/vise-api/Dockerfile"
            "./vise-api/Dockerfile"
            "./Dockerfile"
            "./app/Dockerfile"
            "./backend/Dockerfile"
          )

          DOCKERFILE=""
          CONTEXT=""
          for c in "${CANDIDATES[@]}"; do
            if [ -f "$c" ]; then
              DOCKERFILE="$c"
              # context = carpeta donde está el Dockerfile
              CONTEXT="$(dirname "$c")"
              break
            fi
          done

          if [ -z "$DOCKERFILE" ]; then
            echo "❌ No Dockerfile encontrado en las rutas probadas:"
            for c in "${CANDIDATES[@]}"; do echo "  - $c"; done
            echo "Revisa que el Dockerfile esté commiteado y vuelve a ejecutar."
            exit 1
          fi

          echo "✅ Dockerfile encontrado: $DOCKERFILE"
          echo "✅ Context usado: $CONTEXT"

          # Mostrar las primeras líneas para debug
          echo "---- head $DOCKERFILE ----"
          sed -n '1,20p' "$DOCKERFILE" || true
          echo "--------------------------"

          echo "🔧 Ejecutando docker buildx build --push ..."
          docker buildx build \
            --file "$DOCKERFILE" \
            --tag "${IMAGE_FULL}" \
            --push \
            "$CONTEXT"

  deploy:
    name: Deploy remote container to Azure
    runs-on: ubuntu-latest
    needs: build-and-push-image
    env:
      IMAGE_FULL: ${{ secrets.ACR_NAME_ARCHI }}.azurecr.io/${{ github.event.inputs.IMAGE_REPOSITORY }}:${{ github.event.inputs.IMAGE_TAG }}
    steps:
      - name: Deploy to Azure Web App for Containers
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ github.event.inputs.AZURE_WEBAPP_NAME_ARCHI }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_ARCHI }}
          images: ${{ env.IMAGE_FULL }}

  test-deploy:
    name: Test deployed service
    runs-on: ubuntu-latest
    needs: [build-and-push-image, deploy]
    steps:
      - name: Checkout session.hurl
        uses: actions/checkout@v3
        with:
          sparse-checkout: |
            session.hurl
          sparse-checkout-cone-mode: false

      - name: Setup hurl (API testing tool)
        uses: gacts/install-hurl@v1

      - name: Test API with hurl
        run: |
          hurl --variable host=https://${{ github.event.inputs.AZURE_WEBAPP_PUBLISH_ARCHI }}.azurewebsites.net:${{ github.event.inputs.PORT }} \
               --connect-timeout 20s --error-format long --verbose --test session.hurl
