name: Azure Continuous Delivery

on:
  workflow_dispatch:
    inputs:
      IMAGE_REPOSITORY:
        description: 'Repository of the image (same as declared in App Service creation)'
        required: true
        default: 'api-vise'
      IMAGE_TAG:
        description: 'Tag of the image'
        required: true
        default: 'latest'
      AZURE_WEBAPP_NAME:
        description: 'Nombre del App Service creado en Azure'
        required: true
      PORT:
        description: 'Port of the application'
        required: true
        default: '443'

jobs:
  build-and-push-image:
    name: Build and Push to ACR
    runs-on: ubuntu-latest
    env:
      ACR_HOST: ${{ secrets.ACR_NAME_ARCHI }}.azurecr.io
      IMAGE_FULL: ${{ secrets.ACR_NAME_ARCHI }}.azurecr.io/${{ github.event.inputs.IMAGE_REPOSITORY }}:${{ github.event.inputs.IMAGE_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_NAME_ARCHI }}.azurecr.io
          username: ${{ secrets.ACR_NAME_ARCHI }}
          password: ${{ secrets.ACR_PASSWORD_ARCHI }}

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect Dockerfile and build+push
        run: |
          set -euo pipefail
          # candidatas (ajusta si quieres)
          CANDIDATES=( "./vise-api/vise-api/Dockerfile" "./vise-api/Dockerfile" "./Dockerfile" )
          DOCKERFILE=""
          CONTEXT=""
          for c in "${CANDIDATES[@]}"; do
            if [ -f "$c" ]; then
              DOCKERFILE="$c"
              CONTEXT="$(dirname "$c")"
              break
            fi
          done
          if [ -z "$DOCKERFILE" ]; then
            echo "No Dockerfile encontrado en las rutas probadas."
            exit 1
          fi
          echo "Usando Dockerfile: $DOCKERFILE"
          echo "Context: $CONTEXT"
          docker buildx build --file "$DOCKERFILE" --tag "${IMAGE_FULL}" --push "$CONTEXT"

  deploy:
    name: Deploy remote container to Azure
    runs-on: ubuntu-latest
    needs: build-and-push-image
    env:
      IMAGE_FULL: ${{ secrets.ACR_NAME_ARCHI }}.azurecr.io/${{ github.event.inputs.IMAGE_REPOSITORY }}:${{ github.event.inputs.IMAGE_TAG }}
    steps:
      - name: Deploy to Azure Web App for Containers
        uses: azure/webapps-deploy@v2
        with:
          # aquí usamos el input AZURE_WEBAPP_NAME que sí existe
          app-name: ${{ github.event.inputs.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_ARCHI }}
          images: ${{ env.IMAGE_FULL }}

  test-deploy:
    name: Test deployed service
    runs-on: ubuntu-latest
    needs: [build-and-push-image, deploy]
    steps:
      - name: Checkout session.hurl
        uses: actions/checkout@v3
        with:
          sparse-checkout: |
            session.hurl
          sparse-checkout-cone-mode: false

      - name: Setup hurl (API testing tool)
        uses: gacts/install-hurl@v1

      - name: Test API with hurl
        run: |
          # Usamos consistentemente AZURE_WEBAPP_NAME (definido en inputs)
          APP_NAME="${{ github.event.inputs.AZURE_WEBAPP_NAME }}"
          PORT="${{ github.event.inputs.PORT }}"
          if [ -z "$APP_NAME" ]; then
            echo "ERROR: AZURE_WEBAPP_NAME está vacío. Pasa el nombre del App Service al ejecutar el workflow."
            exit 1
          fi
          if [ ! -f ./session.hurl ]; then
            echo "ERROR: session.hurl no encontrado en la raíz del repo."
            exit 1
          fi
          # Construimos la URL completa (sin punto extra)
          HOST="https://${APP_NAME}.azurewebsites.net:${PORT}"
          echo "Hurl testing host: $HOST"
          hurl --variable host="$HOST" --connect-timeout 20s --error-format long --verbose --test session.hurl
